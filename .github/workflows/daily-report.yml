name: Daily report

on:
  schedule:
    # UTC 23:30 = 北京时间 07:30，先增量刷新再推送每日早报
    - cron: "30 23 * * *"
  workflow_dispatch: {}

concurrency:
  group: refresh-news
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh and push daily report
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          LLM_VERIFY_PROVIDER: ${{ secrets.LLM_VERIFY_PROVIDER }}
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
          DOUBAO_ENDPOINT: ${{ secrets.DOUBAO_ENDPOINT }}
          DOUBAO_MODEL: ${{ secrets.DOUBAO_MODEL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_ENDPOINT: ${{ secrets.DEEPSEEK_ENDPOINT }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python refresh_job.py --mode incremental --daily-report
